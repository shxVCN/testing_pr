{% extends 'tasks/base.html' %}

{% block title %}Удалить задачу - To-Do List{% endblock %}

{% block content %}
<div class="card border-danger">
    <div class="card-header bg-danger text-white">
        <h4 class="mb-0">Подтверждение удаления</h4>
    </div>
    <div class="card-body">
        <p>Вы уверены, что хотите удалить задачу <strong>{{ task.title }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'task_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
